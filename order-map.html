<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pesan Ojek - Ojek Hulu</title>

<link
rel="stylesheet"
href="css/style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">

<link
rel="manifest"
href="/manifest.webmanifest">

<meta
name="theme-color"
content="#00AA13">

<meta
name="mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="apple-mobile-web-app-title"
content="Ojek Hulu">

<style>

*{

    box-sizing:border-box;

}

html,
body{

    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#f5f5f5;

}

#map{

    position:fixed;

    inset:0;

    z-index:1;

}

.bottom-sheet{

    position:fixed;

    left:0;
    right:0;
    bottom:0;

    height:320px;

    background:#fff;

    border-radius:24px 24px 0 0;

    box-shadow:0 -8px 30px rgba(0,0,0,.18);

    z-index:999;

    transition:height .3s ease;

    overflow:hidden;

}

.bottom-sheet.expanded{

    height:80vh;

}

.sheet-handle{

    width:60px;

    height:6px;

    background:#d0d0d0;

    border-radius:50px;

    margin:12px auto;

}

.sheet-content{

    height:calc(100% - 30px);

    overflow:auto;

    padding:20px;

}

.sheet-title{

    font-size:22px;

    font-weight:bold;

    margin-bottom:20px;

}

.info{

    margin-bottom:18px;

}

.label{

    color:#666;

    font-size:13px;

    margin-bottom:6px;

}

.value{

    font-size:16px;

    font-weight:bold;

    word-break:break-word;

}

.summary{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:12px;

    margin:20px 0;

}

.summary-card{

    background:#f7f7f7;

    border-radius:12px;

    padding:12px;

    text-align:center;

}

.summary-card small{

    display:block;

    color:#666;

    margin-bottom:6px;

}

.summary-card b{

    font-size:16px;

}

.btn{

    width:100%;

    padding:16px;

    border:none;

    border-radius:12px;

    background:#18A558;

    color:#fff;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

.btn:disabled{

    opacity:.6;

    cursor:not-allowed;

}

#search-box{

position:fixed;

top:15px;

left:15px;

right:15px;

z-index:2000;

}

#destination-search{

width:100%;

padding:15px;

border:none;

border-radius:14px;

font-size:16px;

box-shadow:0 4px 15px rgba(0,0,0,.15);

}

#search-result{

margin-top:10px;

background:#fff;

border-radius:12px;

overflow:hidden;

display:none;

max-height:250px;

overflow-y:auto;

box-shadow:0 4px 20px rgba(0,0,0,.15);

}

.search-item{

padding:15px;

cursor:pointer;

border-bottom:1px solid #eee;

}

.search-item:hover{

background:#f5f5f5;

}

#search-box{

position:fixed;
top:95px;
left:35px;
right:20px;

display:flex;
align-items:center;
gap:12px;

z-index:9999;

}

#btn-back{

width:52px;
height:52px;

border:none;
border-radius:50%;

background:#16a34a;
color:#fff;

font-size:24px;

cursor:pointer;

flex-shrink:0;

}

#search-box input{

flex:1;

}

</style>

</head>

<body>


<div id="map"></div>

<div id="search-box">

<button

id="btn-back"

onclick="history.back()">

←

</button>

<input

id="destination-search"

type="text"

placeholder="🔍 Mau ke mana?"

autocomplete="off">

<div id="search-result"></div>

</div>

<div
id="bottom-sheet"
class="bottom-sheet">

<div class="sheet-handle"></div>

<div class="sheet-content">

<div class="sheet-title">

🚕 Pesan Ojek

</div>

<div class="info">

<div class="label">

📍 Lokasi Jemput

</div>

<div
id="pickup-address"
class="value">

Menunggu GPS...

</div>

</div>

<div class="info">

<div class="label">

🎯 Lokasi Tujuan

</div>

<div
id="destination-address"
class="value">

Tap pada peta untuk memilih tujuan

</div>

</div>

<div class="summary">

<div class="summary-card">

<small>📏 Jarak</small>

<b id="distance">

-

</b>

</div>

<div class="summary-card">

<small>⏱ ETA</small>

<b id="duration">

-

</b>

</div>

<div class="summary-card">

<small>💰 Tarif</small>

<b id="price">

Rp 0

</b>

</div>

</div>

<button
id="btn-order"
class="btn">

🚕 Pesan Sekarang

</button>

</div>

</div>

<script src="./js/pwa.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script
type="module"
src="./js/order-map.js"></script>

</body>

</html>
