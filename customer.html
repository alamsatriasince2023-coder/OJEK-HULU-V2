<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer - Ojek Hulu V2</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
<header class="header">
<div class="header-top">
<div>
<div class="location">📍 Putussibau</div>
<div class="username" id="welcome">Loading...</div>
</div>
<div class="badge">NEW</div>
</div>
</header>

<div class="search-box">
<input type="text" placeholder="Mau ke mana hari ini?">
</div>

<section class="banner">
<h2>🚕 OJEK HULU</h2>
<p>Transportasi Lokal Putussibau</p>
</section>

<section class="menu-grid">
<div class="menu-item" id="btn-order"><div class="menu-icon">🚕</div><div class="menu-title">Ojek</div></div>
<div class="menu-item" id="btn-history"><div class="menu-icon">📋</div><div class="menu-title">Riwayat</div></div>
<div class="menu-item" id="btn-profile"><div class="menu-icon">👤</div><div class="menu-title">Profil</div></div>
<div class="menu-item" id="btn-logout"><div class="menu-icon">🚪</div><div class="menu-title">Logout</div></div>
</section>

<div class="card">
<div class="card-title">Promo Hari Ini</div>
<div class="promo-card">
<b>Diskon 30%</b><br>
Nikmati perjalanan lebih hemat bersama Ojek Hulu.
</div>
</div>

<nav class="bottom-nav">
<div class="bottom-item active"><span class="bottom-icon">🏠</span>Home</div>
<div class="bottom-item"><span class="bottom-icon">📋</span>Aktivitas</div>
<div class="bottom-item"><span class="bottom-icon">💬</span>Inbox</div>
<div class="bottom-item"><span class="bottom-icon">👤</span>Akun</div>
</nav>
</div>

<script type="module">
import { getCurrentUser, logoutUser } from './js/auth.js';
const user=await getCurrentUser();
if(!user){location.href='login.html';}
document.getElementById('welcome').textContent='Halo, '+user.email;
document.getElementById('btn-order').onclick=()=>location.href='order.html';
document.getElementById('btn-history').onclick=()=>location.href='customer-history.html';
document.getElementById('btn-profile').onclick=()=>alert('Profil V2 akan dibuat.');
document.getElementById('btn-logout').onclick=async()=>{await logoutUser();location.href='login.html';};
</script>
</body>
</html>
