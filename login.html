<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Ojek Hulu</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="manifest"
href="/manifest.webmanifest">

<meta
name="theme-color"
content="#00AA13">

<meta
name="mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="apple-mobile-web-app-title"
content="Ojek Hulu">

</head>
<body class="bg-gray-100">

<div class="max-w-md mx-auto min-h-screen flex items-center p-5">

<form id="login-form" class="bg-white w-full p-6 rounded-2xl shadow">

<h1 class="text-2xl font-bold text-center mb-2">
🚕 Ojek Hulu
</h1>

<p class="text-gray-500 text-center mb-6">
Silakan login untuk melanjutkan
</p>

<input
id="email"
type="email"
class="w-full border p-3 rounded-xl mb-3"
placeholder="Email"
required
>

<input
id="password"
type="password"
class="w-full border p-3 rounded-xl mb-4"
placeholder="Password"
required
>

<button
id="btn-login"
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-xl font-bold"
>
Login
</button>

<button
type="button"
onclick="location.href='register.html'"
class="w-full mt-3 border border-green-600 text-green-600 py-3 rounded-xl font-bold"
>
Daftar Akun
</button>

</form>

</div>

<script type="module">

import { loginUser } from './js/auth.js';
import { redirectByRole } from './js/rbac.js';

const form = document.getElementById('login-form');
const btn = document.getElementById('btn-login');

form.addEventListener('submit', async (e)=>{

    e.preventDefault();

    const email =
    document.getElementById('email').value.trim();

    const password =
    document.getElementById('password').value;

    if(email==='' || password===''){

        alert('Email dan Password wajib diisi.');

        return;

    }

    btn.disabled = true;
    btn.innerHTML = 'Sedang Login...';

    const { error } =
    await loginUser(email,password);

    if(error){

        btn.disabled = false;

        btn.innerHTML = 'Login';

        alert(error.message);

        return;

    }

    await redirectByRole();

});

</script>

</body>
</html>
