<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Login - Ojek Hulu</title>

<script src="https://cdn.tailwindcss.com"></script>


<link
rel="manifest"
href="./manifest.webmanifest">

<meta
name="theme-color"
content="#00AA13">

<meta
name="mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="apple-mobile-web-app-title"
content="Ojek Hulu">

<link
rel="icon"
href="./assets/icons/icon-192.png">

</head>

<body class="bg-gradient-to-b from-green-500 to-green-700 min-h-screen">

<div class="max-w-md mx-auto min-h-screen flex items-center p-5">

<form
id="login-form"
class="bg-white w-full rounded-3xl shadow-xl p-8">

<div class="text-center mb-8">

<img

src="./assets/icons/icon-192.png"

class="w-24 h-24 mx-auto mb-4">

<h1 class="text-3xl font-bold">

Ojek Hulu

</h1>

<p class="text-gray-500 mt-2">

Transportasi Lokal Putussibau

</p>

<p class="text-xs text-gray-400 mt-2">

Versi 2.0.0

</p>

</div>

<input

id="email"

type="email"

placeholder="Email"

autocomplete="email"

autofocus

aria-label="Email"

required

class="w-full border rounded-xl p-4 mb-4 outline-none focus:border-green-500">

<input

id="password"

type="password"

placeholder="Password"

autocomplete="current-password"

aria-label="Password"

required

class="w-full border rounded-xl p-4 mb-5 outline-none focus:border-green-500">

<button

id="btn-login"

type="submit"

class="w-full bg-green-600 hover:bg-green-700 transition text-white font-bold rounded-xl p-4">

🚕 Login

</button>

<button

type="button"

onclick="location.href='register.html'"

class="w-full mt-4 border-2 border-green-600 text-green-600 rounded-xl p-4 font-bold">

Daftar Akun

</button>

<p

id="login-message"

class="text-center text-red-500 mt-5 hidden">

</p>

</form>

</div>

<script type="module">

import {
    loginUser,
    getProfile
} from "./js/auth.js";
import { redirectByRole } from "./js/rbac.js";
import { supabase } from "./js/api.js";

/* ===========================
   ELEMENT
=========================== */

const form =
document.getElementById("login-form");

const btn =
document.getElementById("btn-login");

const message =
document.getElementById("login-message");

const passwordInput =
document.getElementById("password");

/* ===========================
   CEK SESSION
=========================== */

btn.disabled = true;
btn.innerHTML = "🔄 Memeriksa Session...";

try{

    const {

        data,

        error

    } =

    await supabase.auth.getSession();

    if(

        !error &&

        data?.session

    ){

        const profile = await getProfile();

         console.log("PROFILE LOGIN =", profile);
         
         if (!profile) {
             throw new Error("Profile tidak ditemukan");
         }
         
         switch (profile.role) {
         
             case "admin":
                 console.log("➡ Admin");
                 location.replace("admin-dashboard.html");
                 return;
         
             case "driver":
                 console.log("➡ Driver");
                 location.replace("driver-dashboard.html");
                 return;
         
             case "customer":
                 console.log("➡ Customer");
                 location.replace("customer.html");
                 return;
         
             default:
                 throw new Error("Role tidak dikenali: " + profile.role);
         
         }

    }

}
catch(err){

    console.error(err);

}

btn.disabled = false;
btn.innerHTML = "🚕 Login";

/* ===========================
   LOGIN
=========================== */

form.addEventListener(

    "submit",

    async(e)=>{

        e.preventDefault();

        message.classList.add("hidden");

        const email =
        document
        .getElementById("email")
        .value
        .trim();

        const password =
        passwordInput.value;

        if(

            !email ||

            !password

        ){

            message.textContent =
            "Email dan Password wajib diisi.";

            message.classList.remove("hidden");

            return;

        }

        btn.disabled = true;

        btn.innerHTML = "🚕 Masuk...";

        try{

            const {

                error

            } =

            await loginUser(

                email,

                password

            );

            if(error){

                throw error;

            }

            const profile = await getProfile();

            console.log("PROFILE LOGIN =", profile);
            
            if (!profile) {
                throw new Error("Profile tidak ditemukan");
            }
            
            switch (profile.role) {
            
                case "admin":
                    console.log("➡ Admin");
                    location.replace("admin-dashboard.html");
                    return;
            
                case "driver":
                    console.log("➡ Driver");
                    location.replace("driver-dashboard.html");
                    return;
            
                case "customer":
                    console.log("➡ Customer");
                    location.replace("customer.html");
                    return;
            
                default:
                    throw new Error("Role tidak dikenali: " + profile.role);
            
            }

        }

        catch(err){

            console.error(err);

            message.textContent =
            err.message ||
            "Login gagal.";

            message.classList.remove("hidden");

        }

        finally{

            btn.disabled = false;

            btn.innerHTML = "🚕 Login";

        }

    }

);

/* ===========================
   ENTER LOGIN
=========================== */

passwordInput.addEventListener(

    "keydown",

    e=>{

        if(

            e.key==="Enter"

        ){

            form.requestSubmit();

        }

    }

);

</script>

<script src="./js/pwa.js"></script>

</body>

</html>
