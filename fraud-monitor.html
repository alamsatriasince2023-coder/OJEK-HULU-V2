<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Fraud Monitor - Ojek Hulu</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container">

<header class="header">

<div class="header-top">

<div>

<div class="location">

🛡 Fraud Monitor

</div>

<div id="admin-name"
class="username">

Loading...

</div>

<div style="
margin-top:8px;
font-size:13px;
opacity:.9;">

Realtime Security Center

</div>

</div>

<div>

<div class="badge">

LIVE

</div>

</div>

</div>

<div style="
margin-top:24px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;">

<div class="kpi-card">

<small>

Total Alert

</small>

<h2 id="total-alert">

0

</h2>

</div>

<div class="kpi-card">

<small>

Critical

</small>

<h2 id="critical-alert">

0

</h2>

</div>

<div class="kpi-card">

<small>

Suspended

</small>

<h2 id="suspend-user">

0

</h2>

</div>

<div class="kpi-card">

<small>

Resolved

</small>

<h2 id="resolved-alert">

0

</h2>

</div>

</div>

</header>

<div class="card">

<div class="card-title">

🚨 Fraud Alert

</div>

<div id="fraud-list">

<div style="
padding:40px;
text-align:center;
color:#6B7280;">

Belum ada Fraud Alert.

</div>

</div>

</div>

<!-- ===========================
DETAIL FRAUD
=========================== -->

<div class="card">

<div class="card-title">

🔍 Detail Fraud

</div>

<div class="stat-grid">

<div class="stat-box">

<span>

User

</span>

<h2
id="detail-user"
style="font-size:16px;">

-

</h2>

</div>

<div class="stat-box">

<span>

Jenis

</span>

<h2
id="detail-type"
style="font-size:16px;">

-

</h2>

</div>

<div class="stat-box">

<span>

Level

</span>

<h2
id="detail-level"
style="font-size:16px;">

-

</h2>

</div>

<div class="stat-box">

<span>

Status

</span>

<h2
id="detail-status"
style="font-size:16px;">

-

</h2>

</div>

</div>

<div
style="
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;">

<button
id="btn-resolve"
class="btn btn-green">

✅ Resolve

</button>

<button
id="btn-suspend"
class="btn btn-red">

🚫 Suspend User

</button>

</div>

</div>

<!-- ===========================
BOTTOM NAV
=========================== -->

<nav class="bottom-nav">

<div
class="bottom-item active"
id="btn-home">

<span class="bottom-icon">

🏠

</span>

Home

</div>

<div
class="bottom-item"
id="btn-audit">

<span class="bottom-icon">

📝

</span>

Audit

</div>

<div
class="bottom-item"
id="btn-setting">

<span class="bottom-icon">

⚙️

</span>

Settings

</div>

<div
class="bottom-item"
id="btn-back">

<span class="bottom-icon">

⬅️

</span>

Admin

</div>

</nav>

</div>

<script
type="module"
src="./js/fraud-monitor.js"></script>

<script
src="./js/pwa.js"></script>

</body>

</html>
