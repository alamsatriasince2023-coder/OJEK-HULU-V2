<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - Ojek Hulu V2</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="manifest"
href="/manifest.webmanifest">

<meta
name="theme-color"
content="#00AA13">

<meta
name="mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="apple-mobile-web-app-title"
content="Ojek Hulu">

</head>
<body class="bg-gray-100">

<div class="max-w-md mx-auto min-h-screen flex items-center p-5">

<form id="register-form" class="bg-white w-full p-6 rounded-2xl shadow">

<h1 class="text-2xl font-bold text-center mb-2">
🚕 Ojek Hulu
</h1>

<p class="text-center text-gray-500 mb-6">
Buat akun baru
</p>

<input
id="full-name"
type="text"
class="w-full border p-3 rounded-xl mb-3"
placeholder="Nama Lengkap"
required
>

<input
id="phone"
type="tel"
class="w-full border p-3 rounded-xl mb-3"
placeholder="Nomor HP"
required
>

<input
id="email"
type="email"
class="w-full border p-3 rounded-xl mb-3"
placeholder="Email"
required
>

<input
id="password"
type="password"
class="w-full border p-3 rounded-xl mb-4"
placeholder="Password (minimal 6 karakter)"
required
>

<button
id="btn-register"
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">
Daftar
</button>

<button
type="button"
onclick="location.href='login.html'"
class="w-full mt-3 border border-green-600 text-green-600 py-3 rounded-xl font-bold">
Sudah punya akun? Login
</button>

</form>

</div>

<script type="module">

import { registerUser } from './js/auth.js';

const form = document.getElementById('register-form');
const btn = document.getElementById('btn-register');

form.addEventListener('submit', async (e)=>{

    e.preventDefault();

    const fullName = document.getElementById('full-name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if(fullName === '' || phone === '' || email === '' || password === ''){

        alert('Semua data wajib diisi.');

        return;

    }

    if(password.length < 6){

        alert('Password minimal 6 karakter.');

        return;

    }

    btn.disabled = true;
    btn.innerHTML = 'Mendaftarkan...';

    const { error } = await registerUser(

        email,
        password,
        fullName,
        phone
    
    );

    if(error){

        btn.disabled = false;
        btn.innerHTML = 'Daftar';

        alert(error.message);

        return;

    }

    alert('✅ Registrasi berhasil.\nSilakan login.');

    location.href='login.html';

});

</script>

</body>
</html>
