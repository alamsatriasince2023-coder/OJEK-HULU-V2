<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>Admin Dashboard - Ojek Hulu</title>

<link
rel="stylesheet"
href="css/style.css">

<link
rel="manifest"
href="/manifest.webmanifest">

<meta
name="theme-color"
content="#16a34a">

</head>

<body>

<div class="container">

<header class="header">

<div class="header-top">

<div>

<div class="location">

🛠 Administrator

</div>

<div

id="admin-name"

class="username">

Loading...

</div>

</div>

<div class="badge">

ADMIN

</div>

</div>

</header>

<div class="card">

<div class="card-title">

📊 Statistik Hari Ini

</div>

<div

style="display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;">

<div class="promo-card">

👥 Customer

<h2 id="total-customer">

0

</h2>

</div>

<div class="promo-card">

🚕 Driver Online

<h2 id="driver-online">

0

</h2>

</div>

<div class="promo-card">

📦 Order Aktif

<h2 id="order-active">

0

</h2>

</div>

<div class="promo-card">

✅ Order Selesai

<h2 id="order-complete">

0

</h2>

</div>

</div>

</div>

<div class="card">

<div class="card-title">

📡 Order Realtime

</div>

<div

id="order-list">

Loading...

</div>

</div>

<div class="card">

<div class="card-title">

⚡ Menu Admin

</div>

<section class="menu-grid">

<div

class="menu-item"

id="btn-driver">

<div class="menu-icon">

🚕

</div>

<div class="menu-title">

Driver

</div>

</div>

<div

class="menu-item"

id="btn-customer">

<div class="menu-icon">

👥

</div>

<div class="menu-title">

Customer

</div>

</div>

<div

class="menu-item"

id="btn-order">

<div class="menu-icon">

📦

</div>

<div class="menu-title">

Order

</div>

</div>

<div

class="menu-item"

id="btn-report">

<div class="menu-icon">

📊

</div>

<div class="menu-title">

Laporan

</div>

</div>

</section>

</div>

<nav class="bottom-nav">

<div

class="bottom-item active"

id="btn-home">

<span class="bottom-icon">

🏠

</span>

Home

</div>

<div

class="bottom-item"

id="btn-monitor">

<span class="bottom-icon">

📡

</span>

Monitor

</div>

<div

class="bottom-item"

id="btn-setting">

<span class="bottom-icon">

⚙️

</span>

Setting

</div>

<div

class="bottom-item"

id="btn-logout">

<span class="bottom-icon">

🚪

</span>

Logout

</div>

</nav>

</div>

<script

type="module"

src="./js/admin-dashboard.js">

</script>

<script src="./js/pwa.js"></script>

</body>

</html>
