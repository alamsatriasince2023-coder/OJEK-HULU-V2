<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Ojek - Ojek Hulu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="padding:20px 20px 0 20px;">
    <button
        onclick="history.back()"
        class="btn btn-gray">
        ← Kembali
    </button>
</div>
    
<div class="container">
<div class="card">
<h1 style="font-size:28px;font-weight:bold;margin-bottom:20px;">
Pesan Ojek
</h1>
<p style="margin-bottom:20px;color:#666;">
Masukkan lokasi penjemputan dan tujuan perjalanan.
</p>
<form id="order-form">

<input
id="pickup"
class="input"
placeholder="Lokasi Jemput"
required
/>

<input
id="destination"
class="input"
placeholder="Lokasi Tujuan"
required
/>

<textarea
id="notes"
class="textarea"
placeholder="Catatan (opsional)"
></textarea>

<div class="card" style="margin:20px 0;">

    <div class="card-title">
        Estimasi Tarif
    </div>

    <h2
        id="estimate"
        style="color:#16a34a;">
        Rp 15.000
    </h2>

    <p style="color:#888;">
        Estimasi sementara.
    </p>

</div>

<button
    type="submit"
    class="btn btn-green">
    🚕 Pesan Sekarang
</button>
</form>

</div>
</div>
<script type="module">
import { supabase } from './js/api.js';
import { getCurrentUser } from './js/auth.js';
const user = await getCurrentUser();
if(!user){
    location.href='login.html';
}
document
.getElementById('order-form')
.addEventListener('submit', async(e)=>{
    e.preventDefault();
    const pickup =
    document.getElementById('pickup').value;
    const destination =
    document.getElementById('destination').value;
    const notes =
    document.getElementById('notes').value;

    if(!pickup || !destination){

        alert('Lokasi jemput dan tujuan wajib diisi.');
    
        return;
    
    }

    const btn =
    document.querySelector('button[type="submit"]');
    
    btn.disabled = true;
    
    btn.innerHTML = 'Mengirim...';
    
    const { error } = await supabase
    .from('orders')
    .insert({
        customer_id: user.id,
        nama: user.email,
        jemput: pickup,
        tujuan: destination,
        catatan: notes,
        status: 'pending'
    });
    if(error){

        btn.disabled = false;
    
        btn.innerHTML = '🚕 Pesan Sekarang';
    
        console.error(error);
    
        alert(error.message);
    
        return;
    
    }
    
    alert('✅ Order berhasil dibuat');

    location.href = 'customer.html';
});
</script>
</body>
</html>
