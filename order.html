<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Ojek - Ojek Hulu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="padding:20px 20px 0 20px;">
    <button
        onclick="history.back()"
        class="btn btn-gray">
        ← Kembali
    </button>
</div>
    
<div class="container">
<div class="card">
<h1 style="font-size:28px;font-weight:bold;margin-bottom:20px;">
Pesan Ojek
</h1>
<p style="margin-bottom:20px;color:#666;">
Masukkan lokasi penjemputan dan tujuan perjalanan.
</p>
<form id="order-form">

<input
id="pickup"
class="input"
placeholder="Lokasi Jemput"
required
/>

<input
id="destination"
class="input"
placeholder="Lokasi Tujuan"
required
/>

<textarea
id="notes"
class="textarea"
placeholder="Catatan (opsional)"
></textarea>

<div class="card" style="margin:20px 0;">

    <div class="card-title">
        Estimasi Tarif
    </div>

    <h2
        id="estimate"
        style="color:#16a34a;">
        Rp 15.000
    </h2>

    <p style="color:#888;">
        Estimasi sementara.
    </p>

</div>

<button
    type="submit"
    class="btn btn-green">
    🚕 Pesan Sekarang
</button>
</form>

</div>
</div>
<script type="module" src="./js/order.js"></script>
</body>
</html>
