<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Tracking Order - Ojek Hulu</title>

<link
rel="stylesheet"
href="css/style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>

html,
body{

margin:0;

height:100%;

overflow:hidden;

font-family:Arial,sans-serif;

}

#map{

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

z-index:1;

}

.bottom-sheet{

position:fixed;

left:0;

right:0;

bottom:0;

height:300px;

background:#fff;

border-radius:24px 24px 0 0;

padding:20px;

z-index:999;

box-shadow:0 -8px 25px rgba(0,0,0,.2);

overflow:auto;

}

.status{

font-size:22px;

font-weight:bold;

margin-bottom:15px;

}

.driver-card{

display:flex;

align-items:center;

gap:15px;

margin-bottom:20px;

}

.avatar{

width:60px;

height:60px;

border-radius:50%;

background:#00AA13;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

color:white;

}

.info{

margin-bottom:12px;

}

.info b{

display:block;

font-size:18px;

margin-top:5px;

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

margin-top:15px;

}

.box{

background:#f5f5f5;

padding:15px;

border-radius:14px;

text-align:center;

}

.action{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

margin-top:25px;

}

.btn{

padding:16px;

font-size:17px;

border:none;

border-radius:12px;

cursor:pointer;

}

.btn-green{

background:#00AA13;

color:white;

}

.btn-red{

background:#ff4444;

color:white;

}

</style>

</head>

<body>

<div id="map"></div>

<div class="bottom-sheet">

<div
id="order-status"
class="status">

🔍 Mencari Driver...

</div>

<div class="driver-card">

<div class="avatar">

🚕

</div>

<div>

<div
id="driver-name">

Belum ada driver

</div>

<div
id="driver-phone">

-

</div>

</div>

</div>

<div class="grid">

<div class="box">

<div>

📏 Jarak

</div>

<b id="distance">

-

</b>

</div>

<div class="box">

<div>

⏱ ETA

</div>

<b id="eta">

-

</b>

</div>

<div class="box">

<div>

💰 Tarif

</div>

<b id="price">

-

</b>

</div>

<div class="box">

<div>

🚦 Status

</div>

<b id="status-text">

Pending

</b>

</div>

</div>

<div class="action">

<button

id="btn-call"

class="btn btn-green">

☎ Hubungi

</button>

<button

id="btn-cancel"

class="btn btn-red">

❌ Batalkan

</button>

</div>

</div>

<script src="./js/pwa.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="./js/leaflet.rotatedMarker.js"></script>

<script
type="module"
src="./js/order-status-map.js"></script>

</body>

</html>
