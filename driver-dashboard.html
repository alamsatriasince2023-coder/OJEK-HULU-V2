<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Dashboard - Ojek Hulu</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container">

<header class="header">

<div class="header-top">

<div>

<div class="location">

🚕 Driver Ojek Hulu

</div>

<div
class="username"
id="driver-name">

Loading...

</div>

</div>

<div
class="badge"
id="driver-badge">

OFFLINE

</div>

</div>

</header>

<!-- ===========================
STATUS DRIVER
=========================== -->

<div class="card">

<div class="card-title">

🟢 Status Driver

</div>

<h2
id="driver-status"
style="margin:15px 0;">

🔴 OFFLINE

</h2>

<button
id="btn-online"
class="btn btn-green">

GO ONLINE

</button>

</div>

<!-- ===========================
STATISTIK
=========================== -->

<div class="card">

<div class="card-title">

📊 Statistik Hari Ini

</div>

<div
style="
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:15px;
">

<div>

<div
style="
font-size:12px;
color:#888;
">

Order

</div>

<h2 id="today-order">

0

</h2>

</div>

<div>

<div
style="
font-size:12px;
color:#888;
">

Pendapatan

</div>

<h2 id="today-income">

Rp 0

</h2>

</div>

</div>

</div>

<!-- ===========================
ORDER MASUK
=========================== -->

<div class="card">

<div class="card-title">

📋 Order Masuk

</div>

<div id="order-list">

<div
style="
padding:30px;
text-align:center;
">

Memuat order...

</div>

</div>

</div>

<!-- ===========================
BOTTOM NAV
=========================== -->

<nav class="bottom-nav">

<div class="bottom-item active">

🏠

<br>

Home

</div>

<div
class="bottom-item"
id="btn-history">

📋

<br>

Riwayat

</div>

<div
class="bottom-item"
id="btn-profile">

👤

<br>

Profil

</div>

<div
class="bottom-item"
id="btn-logout">

🚪

<br>

Logout

</div>

</nav>

</div>

<script
type="module"
src="./js/driver-dashboard.js"></script>

</body>
</html>
